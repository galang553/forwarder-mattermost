services:
  forwarder:
    build: .
    container_name: mattermost-forwarder
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - mattermost_network

networks:
  mattermost_network:
    name: mattermost_mattermost_network
    external: true
